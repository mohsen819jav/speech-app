name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev llvm ccache wget

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install build-tools
      run: |
        sdkmanager "build-tools;30.0.3"
        sdkmanager "platforms;android-30"
        echo "$ANDROID_SDK_ROOT/build-tools/30.0.3" >> $GITHUB_PATH

    - name: Verify aidl
      run: |
        which aidl || echo "aidl not in PATH"
        find $ANDROID_SDK_ROOT -name aidl 2>/dev/null || echo "aidl not found"

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK
      run: buildozer android debug
      env:
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: speech-app
        path: bin/*.apk
        retention-days: 30
