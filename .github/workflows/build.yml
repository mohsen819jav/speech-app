name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          llvm ccache wget

    - name: Install Android SDK
      run: |
        # پوشه SDK
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        
        # دانلود Command Line Tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        # ✅ ساختار درست برای cmdline-tools
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools/latest
        
        # تنظیم مسیرها
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # نصب build-tools
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-30"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        
        # مسیر build-tools
        echo "$HOME/android-sdk/build-tools/30.0.3" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

    - name: Verify SDK
      run: |
        echo "🔍 بررسی SDK:"
        ls -la $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --version

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK
      run: buildozer android debug
      env:
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: speech-app
        path: bin/*.apk
        retention-days: 30
