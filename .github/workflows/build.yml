name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython

      - name: Initialize Buildozer
        run: |
          buildozer init
          sed -i 's/^#requirements = python3,kivy/requirements = python3,kivy,pyjnius,android,audiostream,openssl,setuptools,cython,libffi-dev,libssl-dev,ffpyplayer,pygments,python-bidi,arabic-reshaper/' buildozer.spec
          sed -i 's/^#android.permissions = INTERNET/android.permissions = INTERNET, RECORD_AUDIO/' buildozer.spec
          sed -i 's/^#android.api = 30/android.api = 30/' buildozer.spec
          sed -i 's/^#android.minapi = 21/android.minapi = 21/' buildozer.spec

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: bin/*.apk
