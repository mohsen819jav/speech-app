name: Build APK

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # اجازه اجرای دستی

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45  # محدودیت زمان
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            llvm \
            llvm-dev

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Configure buildozer.spec
        run: |
          # پشتیبان‌گیری از فایل اصلی
          cp buildozer.spec buildozer.spec.backup
          
          # تنظیمات اصلی (بدون sed های خطرناک)
          echo "✅ فایل buildozer.spec تنظیم شد"

      - name: Build APK
        run: |
          # ساخت APK با تنظیمات صحیح
          buildozer android debug deploy run

      - name: List built files
        run: |
          echo "📁 فایل‌های ساخته شده:"
          ls -la bin/ || echo "پوشه bin وجود ندارد"

      - name: Upload APK
        if: success()  # فقط اگر ساخت موفق بود
        uses: actions/upload-artifact@v4
        with:
          name: speech-app-android
          path: bin/*.apk
          retention-days: 30  # نگهداری فایل به مدت ۳۰ روز
