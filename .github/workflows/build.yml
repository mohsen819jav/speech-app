name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev llvm ccache wget

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses and install build-tools
      run: |
        # ✅ قبول کردن همه لایسنس‌ها
        yes | sdkmanager --licenses
        
        # ✅ نصب build-tools نسخه 30.0.3
        sdkmanager "build-tools;30.0.3"
        sdkmanager "platforms;android-30"
        sdkmanager "platform-tools"
        
        # ✅ تنظیم مسیر
        echo "$ANDROID_SDK_ROOT/build-tools/30.0.3" >> $GITHUB_PATH
        
        # ✅ بررسی نصب
        echo "🔍 بررسی فایل‌های نصب شده:"
        ls -la $ANDROID_SDK_ROOT/build-tools/ || echo "build-tools پوشه وجود ندارد"
        ls -la $ANDROID_SDK_ROOT/build-tools/30.0.3/ || echo "نسخه 30.0.3 وجود ندارد"

    - name: Verify aidl
      run: |
        echo "🔍 جستجوی aidl:"
        find $ANDROID_SDK_ROOT -name "aidl" -type f 2>/dev/null || echo "❌ aidl پیدا نشد"
        
        # اگر aidl در مسیرهای مختلف هست
        if [ -f "$ANDROID_SDK_ROOT/build-tools/30.0.3/aidl" ]; then
          echo "✅ aidl پیدا شد در: $ANDROID_SDK_ROOT/build-tools/30.0.3/"
          echo "$ANDROID_SDK_ROOT/build-tools/30.0.3" >> $GITHUB_PATH
        elif [ -f "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl" ]; then
          echo "✅ aidl پیدا شد در: $ANDROID_SDK_ROOT/build-tools/34.0.0/"
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH
        else
          echo "❌ aidl پیدا نشد! نصب مجدد..."
          sdkmanager "build-tools;30.0.3"
        fi

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK
      run: buildozer android debug
      env:
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: speech-app
        path: bin/*.apk
        retention-days: 30
