name: Build APK

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ==================== نصب کامل Android SDK با یک خط ====================
      - name: Install Android SDK
        uses: malinskiy/action-android@release
        with:
          build-tools: 34.0.0
          platforms: android-33

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev libltdl-dev llvm llvm-dev ccache

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ==================== تنظیم مسیر ====================
      - name: Set Android SDK path
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Build APK
        run: buildozer android debug deploy run
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: speech-app-android
          path: bin/*.apk
          retention-days: 30
