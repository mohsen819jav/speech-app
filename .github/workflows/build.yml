name: Build APK

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # اجازه اجرای دستی

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45  # محدودیت زمان
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ==================== نصب Java (پیش‌نیاز اندروید) ====================
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ==================== نصب Android SDK ====================
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ==================== نصب build-tools (شامل aidl) ====================
      - name: Install Android build-tools
        run: |
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platforms;android-33"

      # ==================== اضافه کردن build-tools به PATH ====================
      - name: Add build-tools to PATH
        run: echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      # ==================== نصب وابستگی‌های سیستم ====================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            llvm \
            llvm-dev \
            ccache

      # ==================== نصب Buildozer ====================
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ==================== تنظیمات buildozer.spec ====================
      - name: Configure buildozer.spec
        run: |
          # پشتیبان‌گیری از فایل اصلی
          cp buildozer.spec buildozer.spec.backup
          
          # نمایش محتوای فایل برای بررسی
          echo "📄 محتوای buildozer.spec:"
          cat buildozer.spec

      # ==================== ساخت APK ====================
      - name: Build APK
        run: |
          buildozer android debug deploy run
        env:
          # افزایش حافظه برای ساخت
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"
          JAVA_OPTS: "-Xmx2048m"
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ==================== نمایش فایل‌های ساخته شده ====================
      - name: List built files
        run: |
          echo "📁 فایل‌های ساخته شده:"
          ls -la bin/ || echo "پوشه bin وجود ندارد"
          echo "🔍 جستجوی APK در کل پروژه:"
          find . -name "*.apk" -type f

      # ==================== آپلود APK ====================
      - name: Upload APK
        if: success()  # فقط اگر ساخت موفق بود
        uses: actions/upload-artifact@v4
        with:
          name: speech-app-android
          path: |
            bin/*.apk
            *.apk
          retention-days: 30
