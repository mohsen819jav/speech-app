name: Build APK

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ==================== نصب Java ====================
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ==================== نصب وابستگی‌های سیستم ====================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            llvm \
            llvm-dev \
            ccache \
            wget

      # ==================== نصب دستی Android SDK ====================
      - name: Install Android SDK manually
        run: |
          # ایجاد پوشه برای Android SDK
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          
          # دانلود Command Line Tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          mkdir -p cmdline-tools
          mv latest cmdline-tools/
          
          # تنظیم مسیرها
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
          
          # نصب build-tools و platform
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools"

      # ==================== نصب Python packages ====================
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ==================== ساخت APK ====================
      - name: Build APK
        run: |
          buildozer android debug deploy run
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"
          JAVA_OPTS: "-Xmx2048m"

      # ==================== نمایش فایل‌ها ====================
      - name: List built files
        run: |
          echo "📁 فایل‌های ساخته شده:"
          ls -la bin/ || echo "پوشه bin وجود ندارد"
          find . -name "*.apk" -type f

      # ==================== آپلود APK ====================
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: speech-app-android
          path: |
            bin/*.apk
            *.apk
          retention-days: 30
